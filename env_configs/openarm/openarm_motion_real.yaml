# Usage:
#   uv run --no-sync --active capx/envs/launch.py --config-path env_configs/openarm/openarm_motion_real.yaml

env:
  _target_: capx.envs.tasks.openarm.openarm_motion.OpenArmMotionCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level: openarm_real_low_level
    privileged: false
    apis:
      - OpenArmControlApi
    task_only_prompt: |
      Follow the latest OpenArm task instruction delivered by the nanobot runtime.
    prompt: |
      You are controlling a real OpenArm dual-arm robot through safe OpenArm APIs.
      Goal: follow the latest OpenArm task instruction delivered by the nanobot runtime.

      Rules:
      - Prefer execute_motion_primitive(...) and execute_motion_combo(...).
      - Use move_to_named_pose(...) for anchors such as home and safe_standby.
      - Use move_arm_joints_safe(...) only when the motion catalog is insufficient.
      - Use read_tactile(), detect_target(), and get_target_pose() before fine contact actions.
      - Only one active robot task is allowed at a time.
      - Keep actions conservative and return to a stable region when uncertain.
      - Write ONLY executable Python code without markdown fences.

      The APIs below are already imported. Import numpy explicitly if needed.
    multi_turn_prompt: |
      The following code blocks were just executed:
      ```python
      {executed_code}
      ```
      The current console stdout is:
      ```
      {console_stdout}
      ```
      The current console stderr is:
      ```
      {console_stderr}
      ```
      If there were no errors during compilation or execution, the console stderr will be empty.
      If there were errors or the robot has not yet reached the intended region, prefer regenerating safer code.
      Please respond with EXACTLY ONE of the following:
      - The word 'REGENERATE' followed immediately by new Python code in a fenced code block (```python...```) if you want to modify the code.
      - The word 'FINISH' if the task appears to be complete.

record_video: true
use_visual_feedback: false
use_img_differencing: false
output_dir: ./outputs/openarm_real
debug: true

web_ui: true
# web_ui_port: 8200

trials: 1
num_workers: 1
